# Configuration file for the game server

#
# TCP port to reach the game server
ServerPort=5895

#
# Minimum time (milliseconds) between server update ticks
MinServerUpdateTime=1

#
# Time (in seconds) before the server is forced to crash if it is frozen
MaxCoreStuckTime=60

#
# Update server uptime period (in minutes)
UpdateUptimeInterval=10

#
# TCP port to reach the game relay server for matchmaking
RelayPort=5896

#
# Interval (in seconds) between publishing server metrics
UpdateMetricsInterval=15

# ------------------------------------------------------------
# Battle Stat Scaling
# Controls how much each stat affects combat
# Defaults match the original client behavior
# ------------------------------------------------------------

#
# STR
# How much 1 point of STR affects damage dealt
# Higher value = more damage per point of STR
StrengthDamageScale=0.35

#
# STA
# How much 1 point of STA reduces incoming damage
# Higher value = more damage reduction per point of STA
StaminaDamageReductionScale=0.30

#
# WIL
# How much 1 point of WIL increases ball damage
# Higher value = more ball damage per point of WIL
WillpowerBallDamageScale=0.52

#
# Ball base damage
# Base damage dealt by balls before stat scaling
BallBaseDamage=10

#
# Ball minimum damage
# Minimum damage a ball can deal after all calculations
BallMinDamage=20
