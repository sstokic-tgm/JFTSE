spring.datasource.url=jdbc:mysql://localhost:3306/fantasytennis?autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Berlin
spring.datasource.username=jftse
spring.datasource.password=jftse
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.org.hibernate.envers.store_data_at_delete=true

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

jftse.rabbitmq.enabled=true
jftse.rabbitmq.queue=q-auth
jftse.rabbitmq.exchange=fantasy-messenger
jftse.rabbitmq.binding=system.motd
jftse.rabbitmq.metrics.enabled=true


grpc.server.port=9898

grpc.client.GLOBAL.negotiation-type=plaintext
grpc.client.game-server.address=static://localhost:9899
grpc.client.chat-server.address=static://localhost:9900
