syntax = "proto3";

import "google/protobuf/empty.proto";
import "action.proto";

package com.jftse.proto.auth;
option java_multiple_files = true;
option java_generate_equals_and_hash = true;
option java_package = "com.jftse.proto.auth";

message UpdateAccountRequest {
  int64 timestamp = 1;
  int64 accountId = 2;
  int32 server = 3;
  com.jftse.proto.util.AccountAction accountAction = 4;
}

service AuthService {
  rpc UpdateAccount (UpdateAccountRequest) returns (google.protobuf.Empty) {}
}